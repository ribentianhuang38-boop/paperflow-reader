name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize git submodules
        run: git submodule update --init --recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: sdkmanager "ndk;28.2.13676358"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Setup vendors
        run: pnpm --filter @readest/readest-app setup-vendors

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: android-cargo

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_APP_PLATFORM=tauri" > apps/readest-app/.env.local

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
        run: |
          cd apps/readest-app/
          pnpm tauri android init
          pnpm tauri icon ../../data/icons/readest-book.png
          git checkout .
          pnpm tauri android build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: paperflow-android-apk
          path: |
            apps/readest-app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
